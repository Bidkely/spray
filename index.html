<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Moderne</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            color: #333;
        }
        header {
            background-color: #f8f9fa;
            padding: 1rem;
            text-align: center;
        }
        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        footer {
            background-color: #f8f9fa;
            text-align: center;
            padding: 1rem;
            margin-top: 2rem;
        }
        /* Animation styles */
        .fade-in {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease-out, transform 0.6s ease-out;
        }
        .fade-in.animate {
            opacity: 1;
            transform: translateY(0);
        }
        header {
            animation: slideDown 0.8s ease-out;
        }
        @keyframes slideDown {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
    </style>

</head>
<body>
    <header>
        <h1>Bienvenue sur ma page moderne</h1>
    </header>

    <main class="fade-in">
        <section>
            <h2>Section principale</h2>
            <p>Ceci est un exemple de fichier HTML moderne avec une structure sémantique.</p>
            <p>Il utilise HTML5, des balises sémantiques et un style CSS intégré.</p>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 - Page HTML moderne</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
